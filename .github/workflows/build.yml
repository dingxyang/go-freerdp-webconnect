name: Build and Release

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Install FreeRDP
      run: |
        sudo apt-get update
        sudo apt-get install -y freerdp3-dev freerdp3-x11
    
    - name: Build Go project
      run: |
        go mod tidy
        go build -o go-freerdp-webconnect-linux-amd64
      env:
        CGO_CFLAGS: "-I/usr/include/freerdp3 -I/usr/include/winpr3"
        CGO_LDFLAGS: "-lfreerdp3 -lfreerdp-client3 -lwinpr3"
    
    - name: Test binary
      run: |
        ./go-freerdp-webconnect-linux-amd64 --help
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: go-freerdp-webconnect-linux-amd64
        path: go-freerdp-webconnect-linux-amd64

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Install FreeRDP
      run: |
        brew install freerdp
    
    - name: Build Go project
      run: |
        go mod tidy
        go build -o go-freerdp-webconnect-macos-amd64
      env:
        CGO_CFLAGS: "-I/usr/local/opt/freerdp/include/freerdp3 -I/usr/local/opt/freerdp/include/winpr3"
        CGO_LDFLAGS: "-L/usr/local/opt/freerdp/lib -lfreerdp3 -lfreerdp-client3 -lwinpr3"
    
    - name: Test binary
      run: |
        export DYLD_LIBRARY_PATH=/usr/local/opt/freerdp/lib:$DYLD_LIBRARY_PATH
        ./go-freerdp-webconnect-macos-amd64 --help
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: go-freerdp-webconnect-macos-amd64
        path: go-freerdp-webconnect-macos-amd64

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
    - name: Download Linux artifact
      uses: actions/download-artifact@v4
      with:
        name: go-freerdp-webconnect-linux-amd64
        path: ./artifacts/linux
    
    - name: Download macOS artifact
      uses: actions/download-artifact@v4
      with:
        name: go-freerdp-webconnect-macos-amd64
        path: ./artifacts/macos
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ./artifacts/linux/go-freerdp-webconnect-linux-amd64
          ./artifacts/macos/go-freerdp-webconnect-macos-amd64
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
